{% extends 'base.html' %}

{% block content %}

<div class="card">

<h2>🔐 Login</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<br><br>

<button class="btn">Login</button>

</form>

<p>New user? <a href="/register/">Register</a></p>

</div>

{% endblock %}
