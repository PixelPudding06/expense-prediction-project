<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
<style>
body{
font-family:Arial;
background:linear-gradient(to right,#dbeafe,#eff6ff);
padding:30px;
}
.box{
width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}
input{
width:96%;
padding:12px;
margin:6px 0;
border:1px solid #ccc;
border-radius:8px;
}
button{
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
.card{
background:#f8fafc;
padding:10px;
margin:8px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
}
.delete{
background:red;
padding:6px 10px;
text-decoration:none;
color:white;
border-radius:6px;
}
h1,h2{
text-align:center;
}
</style>
</head>
<body>

<div class="box">

<h1>💸 Expense Prediction App</h1>

<form method="POST">
{% csrf_token %}
<input type="text" name="category" placeholder="Category" required>
<input type="number" name="amount" placeholder="Amount" required>
<input type="date" name="date" required>
<center><button type="submit">Add Expense</button></center>
</form>

<h2>Total: ₹{{ total }}</h2>
<h2>Prediction: ₹{{ prediction }}</h2>
<h2>Remaining: ₹{{ remaining }}</h2>

{% for x in data %}
<div class="card">
<span>{{ x.category }} - ₹{{ x.amount }} - {{ x.date }}</span>
<a href="/delete/{{ x.id }}/" class="delete">Delete</a>
</div>
{% endfor %}

</div>

</body>
</html>
