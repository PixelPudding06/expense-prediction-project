{% extends 'base.html' %}

{% block content %}

<style>
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:18px;
}

.toggle{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
background:#38bdf8;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-top:10px;
}

.stat{
padding:25px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
transition:.3s;
box-shadow:0 0 18px rgba(0,0,0,.25);
}

.stat:hover{
transform:translateY(-6px) scale(1.02);
}

.one{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
.two{background:linear-gradient(135deg,#10b981,#059669);}
.three{background:linear-gradient(135deg,#f59e0b,#d97706);}

.big{
display:block;
font-size:34px;
margin-top:8px;
}

.list p{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.06);
margin:10px 0;
}

canvas{
max-width:460px;
margin:auto;
display:block;
}

body.light-mode{
background:#eef2ff !important;
color:#111827 !important;
}

body.light-mode .card{
background:white !important;
color:#111827 !important;
}

body.light-mode .list p{
background:#f3f4f6 !important;
color:#111827 !important;
}

@media(max-width:950px){
.grid{
grid-template-columns:1fr;
}
}
</style>

<div class="topbar">

<h1>💎 Premium Dashboard</h1>

<div>
<button class="toggle" onclick="toggleTheme()">🌗 Toggle Theme</button>

<a href="/pdf/" class="toggle">📄 Download PDF</a>
</div>

</div>

<div class="grid">

<div class="stat one">
Total Expense
<span class="big" id="count1">0</span>
</div>

<div class="stat two">
Remaining
<span class="big" id="count2">0</span>
</div>

<div class="stat three">
Prediction
<span class="big" id="count3">0</span>
</div>

</div>

<div class="card">
<h2>🥧 Expense Pie Chart</h2>
<canvas id="pieChart"></canvas>
</div>

<div class="card list">
<h2>📜 Recent Expenses</h2>

{% for x in data %}
<p>{{ x.category }} - ₹{{ x.amount }} - {{ x.date }}</p>
{% endfor %}

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById('pieChart'), {
type:'doughnut',
data:{
labels: {{ labels|safe }},
datasets:[{
data: {{ values|safe }},
borderWidth:2
}]
},
options:{
plugins:{
legend:{labels:{color:'white'}}
}
}
});

function animateValue(id,end){
let start=0;
let step=Math.ceil(end/60);
let el=document.getElementById(id);

let timer=setInterval(()=>{
start += step;
if(start>=end){
start=end;
clearInterval(timer);
}
el.innerText="₹"+start;
},20);
}

animateValue("count1", {{ total }});
animateValue("count2", {{ remaining }});
animateValue("count3", {{ prediction }});

function toggleTheme(){
document.body.classList.toggle("light-mode");
}
</script>

{% endblock %}
