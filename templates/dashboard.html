{% extends 'base.html' %}

{% block content %}

<style>

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-top:20px;
}

.stat{
padding:25px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
transition:0.3s;
box-shadow:0 0 18px rgba(0,0,0,0.25);
}

.stat:hover{
transform:scale(1.05);
}

.one{
background:linear-gradient(135deg,#8b5cf6,#7c3aed);
}

.two{
background:linear-gradient(135deg,#10b981,#059669);
}

.three{
background:linear-gradient(135deg,#f59e0b,#d97706);
}

.list p{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.06);
margin:10px 0;
}

canvas{
max-width:420px;
margin:auto;
display:block;
}

</style>

<h1>💸 Premium Expense Dashboard</h1>

<div class="grid">

<div class="stat one">
Total Expense <br> ₹{{ total }}
</div>

<div class="stat two">
Remaining <br> ₹{{ remaining }}
</div>

<div class="stat three">
Prediction <br> ₹{{ prediction }}
</div>

</div>

<div class="card">
<h2>🥧 Expense Pie Chart</h2>
<canvas id="pieChart"></canvas>
</div>

<div class="card list">
<h2>📜 Recent Expenses</h2>

{% for x in data %}
<p>{{ x.category }} - ₹{{ x.amount }} - {{ x.date }}</p>
{% endfor %}

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById('pieChart'), {
type: 'pie',
data: {
labels: {{ labels|safe }},
datasets: [{
data: {{ values|safe }}
}]
}
});
</script>

{% endblock %}
