<!DOCTYPE html>
<html>
<head>
<title>Expense Dashboard</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

nav{
background:rgba(255,255,255,0.08);
padding:18px;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

nav a{
color:white;
text-decoration:none;
margin-right:20px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}

.container{
width:85%;
margin:auto;
padding:25px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin-top:18px;
border-radius:18px;
backdrop-filter:blur(14px);
box-shadow:0 0 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.btn{
background:#38bdf8;
color:white;
padding:10px 14px;
border:none;
border-radius:10px;
text-decoration:none;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

h1,h2{
margin:8px 0;
}

</style>

</head>

<body>

<nav>
<a href="/">Dashboard</a>
<a href="/add/">Add Expense</a>
<a href="/history/">History</a>
<a href="/chart/">Chart</a>
</nav>

<div class="container">
{% block content %}
{% endblock %}
</div>

</body>
</html>
