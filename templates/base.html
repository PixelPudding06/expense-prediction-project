<!DOCTYPE html>
<html>
<head>
<title>Expense Dashboard</title>

<style>
body{
font-family:Arial;
margin:0;
padding:0;
background:#eef2ff;
}

nav{
background:#1e3a8a;
padding:15px;
}

nav a{
color:white;
text-decoration:none;
margin-right:20px;
font-weight:bold;
}

.container{
width:85%;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-top:15px;
border-radius:14px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
}

.btn{
background:#2563eb;
color:white;
padding:8px 12px;
border:none;
border-radius:8px;
text-decoration:none;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}
</style>

</head>

<body>

<nav>
<a href="/">Dashboard</a>
<a href="/add/">Add Expense</a>
<a href="/history/">History</a>
<a href="/chart/">Chart</a>
</nav>

<div class="container">
{% block content %}
{% endblock %}
</div>

</body>
</html>
